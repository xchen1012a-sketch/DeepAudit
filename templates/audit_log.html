{% extends "base.html" %}

{% block title %}审计日志查询 - 深度审计{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-3">
        <div class="col">
            <h2>审计日志查询</h2>
            <p class="text-muted">查看系统操作审计日志与追踪记录</p>
        </div>
    </div>

    <!-- 筛选区 -->
    <div class="card mb-3">
        <div class="card-body">
            <form id="filterForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">操作人ID</label>
                    <input type="number" class="form-control" id="actor_user_id" name="actor_user_id" placeholder="留空查看全部">
                </div>
                <div class="col-md-3">
                    <label class="form-label">操作类型</label>
                    <select class="form-select" id="action" name="action">
                        <option value="">全部</option>
                        <option value="LOGIN_SUCCESS">登录成功</option>
                        <option value="LOGIN_FAIL">登录失败</option>
                        <option value="UPLOAD">上传凭证</option>
                        <option value="VERIFY">验真完成</option>
                        <option value="APPROVAL_APPROVE">审批通过</option>
                        <option value="APPROVAL_REJECT">审批驳回</option>
                        <option value="EXPORT">导出数据</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">目标类型</label>
                    <select class="form-select" id="target_type" name="target_type">
                        <option value="">全部</option>
                        <option value="auth">认证</option>
                        <option value="invoice">凭证</option>
                        <option value="approval">审批</option>
                        <option value="risk_event">风险事件</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Request ID</label>
                    <input type="text" class="form-control" id="request_id" name="request_id" placeholder="请求追踪ID">
                </div>
                <div class="col-md-3">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-control" id="start_date" name="start_date">
                </div>
                <div class="col-md-3">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-control" id="end_date" name="end_date">
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">查询</button>
                    <button type="button" class="btn btn-secondary" id="resetBtn">重置</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 结果表格 -->
    <div class="card">
        <div class="card-body">
            <div id="loadingSpinner" class="text-center py-5" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
            <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
            <div id="resultsContainer">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>操作人</th>
                            <th>操作类型</th>
                            <th>目标类型</th>
                            <th>目标ID</th>
                            <th>客户端IP</th>
                            <th>Request ID</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="8" class="text-center text-muted">请设置筛选条件后点击查询</td>
                        </tr>
                    </tbody>
                </table>
                <div id="pagination" class="d-flex justify-content-between align-items-center mt-3">
                    <div id="totalInfo"></div>
                    <nav>
                        <ul class="pagination mb-0" id="paginationList"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">审计日志详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailContent">
                <div class="text-center py-3">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let currentFilters = {};

// 查询日志
async function queryLogs(page = 1) {
    const form = document.getElementById('filterForm');
    const formData = new FormData(form);
    const params = new URLSearchParams();
    
    for (const [key, value] of formData.entries()) {
        if (value) params.append(key, value);
    }
    params.append('page', page);
    
    currentFilters = Object.fromEntries(params);
    
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('errorAlert').style.display = 'none';
    document.getElementById('resultsContainer').style.display = 'none';
    
    try {
        const response = await fetch(`/api/audit-log/query?${params}`);
        const data = await response.json();
        
        if (!data.ok) {
            throw new Error(data.msg || '查询失败');
        }
        
        renderResults(data);
        currentPage = page;
    } catch (error) {
        document.getElementById('errorAlert').textContent = error.message;
        document.getElementById('errorAlert').style.display = 'block';
    } finally {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('resultsContainer').style.display = 'block';
    }
}

// 渲染结果
function renderResults(data) {
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    
    if (data.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
        document.getElementById('totalInfo').textContent = '';
        document.getElementById('paginationList').innerHTML = '';
        return;
    }
    
    data.data.forEach(log => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${escapeHtml(log.created_at)}</td>
            <td>${escapeHtml(log.actor_name)} (${log.actor_user_id || '-'})</td>
            <td><span class="badge bg-info">${escapeHtml(log.action_cn)}</span></td>
            <td>${escapeHtml(log.target_type)}</td>
            <td>${escapeHtml(log.target_id)}</td>
            <td>${escapeHtml(log.client_ip)}</td>
            <td><code>${escapeHtml(log.request_id)}</code></td>
            <td><button class="btn btn-sm btn-outline-primary" onclick="showDetail(${log.id})">详情</button></td>
        `;
        tbody.appendChild(row);
    });
    
    // 分页信息
    const totalPages = Math.ceil(data.total / data.per_page);
    document.getElementById('totalInfo').textContent = `共 ${data.total} 条记录`;
    
    // 分页按钮
    const paginationList = document.getElementById('paginationList');
    paginationList.innerHTML = '';
    
    if (totalPages > 1) {
        for (let i = 1; i <= totalPages; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#" onclick="queryLogs(${i}); return false;">${i}</a>`;
            paginationList.appendChild(li);
        }
    }
}

// 显示详情
async function showDetail(logId) {
    const modal = new bootstrap.Modal(document.getElementById('detailModal'));
    const content = document.getElementById('detailContent');
    content.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary"></div></div>';
    modal.show();
    
    try {
        const response = await fetch(`/api/audit-log/${logId}`);
        const data = await response.json();
        
        if (!data.ok) {
            throw new Error(data.msg || '加载失败');
        }
        
        const log = data.data;
        
        // 格式化快照数据
        function formatSnapshot(snapshot) {
            if (!snapshot) return '-';
            try {
                const data = typeof snapshot === 'string' ? JSON.parse(snapshot) : snapshot;
                return Object.entries(data).map(([key, value]) => {
                    const label = translateKey(key);
                    const displayValue = formatValue(key, value);
                    return `<div class="d-flex mb-2"><span class="text-muted" style="min-width: 140px;">${label}：</span><span class="fw-medium">${displayValue}</span></div>`;
                }).join('');
            } catch {
                return `<div class="text-muted">${escapeHtml(snapshot)}</div>`;
            }
        }
        
        // 翻译字段名
        function translateKey(key) {
            const translations = {
                'approval_stage': '审批阶段',
                'approval_status': '审批状态',
                'queue_owner_id': '当前处理人',
                'risk_level': '风险等级',
                'action': '操作动作',
                'comment': '审批意见',
                'status': '状态',
                'updated_keys': '更新字段',
                'action_code': '操作代码',
                'log_id': '日志ID'
            };
            return translations[key] || key;
        }
        
        // 格式化值
        function formatValue(key, value) {
            if (value === null || value === undefined || value === '') return '-';
            
            // 状态翻译
            const statusMap = {
                'PENDING': '待审批',
                'APPROVED': '已通过',
                'REJECTED': '已驳回',
                'RETURNED': '已退回',
                'L1': '一级审批',
                'L2': '二级审批',
                'DONE': '已完成',
                'HIGH': '高风险',
                'MEDIUM': '中风险',
                'LOW': '低风险',
                'APPROVE': '通过',
                'REJECT': '驳回',
                'RETURN': '退回',
                'ASSIGN': '分配'
            };
            
            const upperValue = String(value).toUpperCase();
            if (statusMap[upperValue]) {
                return `<span class="badge bg-secondary">${statusMap[upperValue]}</span>`;
            }
            
            // 数组格式化
            if (Array.isArray(value)) {
                return value.map(v => `<span class="badge bg-light text-dark me-1">${escapeHtml(v)}</span>`).join('');
            }
            
            return escapeHtml(String(value));
        }
        
        // 格式化变更原因
        function formatReasonCode(code) {
            const reasons = {
                'POLICY_MATCH': '符合政策',
                'POLICY_EXCEPTION': '政策例外',
                'NEED_MORE_INFO': '需要更多信息',
                'DUPLICATE_SUSPECT': '疑似重复',
                'MANUAL_OVERRIDE': '人工干预'
            };
            return reasons[code] || code || '-';
        }
        
        content.innerHTML = `
            <div class="mb-4">
                <h6 class="border-bottom pb-2 mb-3">操作摘要</h6>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="d-flex">
                            <span class="text-muted" style="min-width: 80px;">操作：</span>
                            <span class="fw-medium">${escapeHtml(log.action_cn)}</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex">
                            <span class="text-muted" style="min-width: 80px;">操作人：</span>
                            <span class="fw-medium">${escapeHtml(log.actor_name)}</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex">
                            <span class="text-muted" style="min-width: 80px;">时间：</span>
                            <span class="fw-medium">${escapeHtml(log.created_at)}</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex">
                            <span class="text-muted" style="min-width: 80px;">对象：</span>
                            <span class="fw-medium">${escapeHtml(log.target_type)}</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex">
                            <span class="text-muted" style="min-width: 80px;">来源IP：</span>
                            <span class="fw-medium">${escapeHtml(log.client_ip) || '-'}</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mb-4">
                <h6 class="border-bottom pb-2 mb-3">详情</h6>
                <div class="bg-light p-3 rounded">
                    ${log.detail ? `<div class="text-break">${escapeHtml(log.detail)}</div>` : '<div class="text-muted">-</div>'}
                </div>
            </div>
            
            ${log.snapshot_before ? `
            <div class="mb-4">
                <h6 class="border-bottom pb-2 mb-3">操作前状态</h6>
                <div class="bg-light p-3 rounded">
                    ${formatSnapshot(log.snapshot_before)}
                </div>
            </div>
            ` : ''}
            
            ${log.snapshot_after ? `
            <div class="mb-4">
                <h6 class="border-bottom pb-2 mb-3">操作后状态</h6>
                <div class="bg-light p-3 rounded">
                    ${formatSnapshot(log.snapshot_after)}
                </div>
            </div>
            ` : ''}
            
            <details class="mt-4">
                <summary class="text-muted small" style="cursor: pointer;">技术信息</summary>
                <div class="mt-3 small">
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">操作代码：</span>
                        <code class="text-dark">${escapeHtml(log.action)}</code>
                    </div>
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">目标ID：</span>
                        <code class="text-dark">${escapeHtml(log.target_id)}</code>
                    </div>
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">变更原因：</span>
                        <span>${formatReasonCode(log.change_reason_code)}</span>
                    </div>
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">追踪ID：</span>
                        <code class="text-dark small">${escapeHtml(log.trace_id) || '-'}</code>
                    </div>
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">请求ID：</span>
                        <code class="text-dark small">${escapeHtml(log.request_id) || '-'}</code>
                    </div>
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">会话ID：</span>
                        <code class="text-dark small">${escapeHtml(log.session_id) || '-'}</code>
                    </div>
                    ${log.user_agent ? `
                    <div class="d-flex mb-2">
                        <span class="text-muted" style="min-width: 120px;">User Agent：</span>
                        <span class="text-break small">${escapeHtml(log.user_agent)}</span>
                    </div>
                    ` : ''}
                </div>
            </details>
        `;
    } catch (error) {
        content.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    }
}

// HTML 转义
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

// 事件监听
document.getElementById('filterForm').addEventListener('submit', (e) => {
    e.preventDefault();
    queryLogs(1);
});

document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('filterForm').reset();
    // 设置默认日期为最近7天
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
    document.getElementById('end_date').valueAsDate = today;
    document.getElementById('start_date').valueAsDate = weekAgo;
});

// 页面加载时设置默认日期
window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
    document.getElementById('end_date').valueAsDate = today;
    document.getElementById('start_date').valueAsDate = weekAgo;
});
</script>
{% endblock %}
