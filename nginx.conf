# Nginx 配置文件示例
# 在宝塔面板中创建网站后，将此配置添加到网站配置中

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名或服务器IP
    
    # 字符集
    charset utf-8;
    
    # 客户端上传文件大小限制
    client_max_body_size 100M;
    
    # 访问日志
    access_log /www/wwwlogs/deepaudit_access.log;
    error_log /www/wwwlogs/deepaudit_error.log;
    
    # 静态文件
    location /static {
        alias /www/wwwroot/deepaudit_pro/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 上传文件
    location /uploads {
        alias /www/wwwroot/deepaudit_pro/uploads;
        expires 7d;
    }
    
    # 代理到 Flask 应用
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }
}

