<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>L2 Review Modal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
<style>
body{background:#f4f7fb;padding:48px;font-family:"Microsoft YaHei",sans-serif}
.modal-card{max-width:560px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 20px 50px rgba(23,35,55,.2);border:1px solid #dbe3ef}
.modal-header{padding:14px 18px;border-bottom:1px solid #e8edf5}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid #e8edf5}
</style>
</head>
<body>
  <div class="modal-card">
    <div class="modal-header">
      <h5 class="mb-0">二线复核确认（高风险 L2）</h5>
    </div>
    <div class="modal-body">
      <div class="alert alert-info">二线复核确认：复核人不得与初审人相同，comment 必填。</div>
      <div class="form-group">
        <label>原因码</label>
        <select class="custom-select"><option>MANUAL_OVERRIDE</option></select>
      </div>
      <div class="form-group">
        <label>复核意见</label>
        <textarea class="form-control" rows="3">已复核证据卡（阈值/实际/超标比例），同意通过。</textarea>
      </div>
      <div class="small text-muted">通过后状态：approval_stage=DONE，approval_status=APPROVED</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-light">取消</button>
      <button class="btn btn-primary">确认通过</button>
    </div>
  </div>
</body>
</html>
