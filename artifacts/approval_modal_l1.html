<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>L1 Review Modal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
<style>
body{background:#f4f7fb;padding:48px;font-family:"Microsoft YaHei",sans-serif}
.modal-card{max-width:560px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 20px 50px rgba(23,35,55,.2);border:1px solid #dbe3ef}
.modal-header{padding:14px 18px;border-bottom:1px solid #e8edf5}
.modal-body{padding:16px 18px}
.modal-footer{padding:12px 18px;border-top:1px solid #e8edf5}
pre{white-space:pre-wrap}
</style>
</head>
<body>
  <div class="modal-card">
    <div class="modal-header">
      <h5 class="mb-0">通过确认（高风险 L1）</h5>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning">高风险单据 L1 通过后不会直接放行，将提交二线复核。</div>
      <div class="form-group">
        <label>原因码</label>
        <select class="custom-select"><option>POLICY_MATCH</option></select>
      </div>
      <div class="form-group">
        <label>说明</label>
        <textarea class="form-control" rows="3">金额超阈值，先提交二线复核。</textarea>
      </div>
      <pre class="small text-muted mb-0">提交后状态：approval_stage=L2，approval_status=PENDING</pre>
    </div>
    <div class="modal-footer">
      <button class="btn btn-light">取消</button>
      <button class="btn btn-primary">确认提交</button>
    </div>
  </div>
</body>
</html>
